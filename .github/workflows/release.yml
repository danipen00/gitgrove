name: Release

# One-button release. Go to Actions ▸ Release ▸ Run workflow, pick the bump
# level (patch / minor / major), and this does everything in a single run:
#
#   1. bumps the version in package.json, commits it and tags v<version> on main
#   2. opens a draft GitHub Release with auto-generated notes
#   3. builds the installers on macOS, Windows and Linux and uploads them — plus
#      the latest*.yml feeds electron-updater reads — onto that draft
#
# You then review the draft and click "Publish release" to make the update go
# live (the notes show verbatim in the in-app update banner). There is no
# package.json bump to do by hand — the workflow owns the version. To publish
# automatically without the review step, see the optional `publish` job at the
# bottom.

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        options: [patch, minor, major]
        default: patch

# The bump commit/tag push and the release upload both use the built-in
# GITHUB_TOKEN, which needs write access to repo contents/releases.
permissions:
  contents: write

jobs:
  # 1) Bump the version, commit + tag on main, and open a draft release.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0 # full history so generated notes can diff against the last tag
      - name: Bump version, commit, tag, push
        id: bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version "${{ inputs.bump }}" -m "Release v%s"   # e.g. 1.0.0 -> 1.0.1; commits + tags
          TAG="v$(node -p "require('./package.json').version")"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          git push origin main --follow-tags
      - name: Create draft release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --draft \
            --generate-notes \
            --title "${{ steps.bump.outputs.tag }}"

  # 2) Build installers on every OS and upload them onto the draft release. Each
  #    runner checks out the freshly created tag, whose package.json already
  #    carries the new version, so electron-builder targets the right release.
  build:
    needs: prepare
    strategy:
      # Don't cancel the other OS builds if one fails; the failed leg can be
      # re-run on its own afterward.
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # macOS universal dmg + zip
          - os: windows-latest # Windows NSIS installer
          - os: ubuntu-latest # Linux AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - run: bun install --frozen-lockfile

      # macOS code signing is optional. With the CSC_LINK secret set we export
      # the full signing + notarization env for a signed, notarized, silently
      # self-updating build; without it we disable signing cleanly (an empty
      # CSC_LINK makes electron-builder try to read it as a cert path and fail).
      # Add the secrets later to switch signing on — no workflow edit needed.
      - name: Configure macOS code signing
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$CSC_LINK" ]; then
            {
              echo "CSC_LINK=$CSC_LINK"
              echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD"
              echo "APPLE_ID=$APPLE_ID"
              echo "APPLE_APP_SPECIFIC_PASSWORD=$APPLE_APP_SPECIFIC_PASSWORD"
              echo "APPLE_TEAM_ID=$APPLE_TEAM_ID"
            } >> "$GITHUB_ENV"
            echo "macOS code signing: ENABLED"
          else
            echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"
            echo "macOS code signing: disabled (no CSC_LINK secret set)"
          fi

      # `bun run release` = electron-vite build && electron-builder --publish
      # always. With no platform flag electron-builder builds for the host OS,
      # so each matrix leg uploads just its own platform's artifacts onto the
      # draft release created above.
      - name: Build and publish
        run: bun run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 3) Optional: publish automatically instead of leaving a draft for review.
  #    Uncomment to make the one button go all the way to a live release.
  #
  # publish:
  #   needs: [prepare, build]
  #   runs-on: ubuntu-latest
  #   steps:
  #     - name: Publish the release
  #       env:
  #         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  #       run: gh release edit "${{ needs.prepare.outputs.tag }}" --repo "${{ github.repository }}" --draft=false --latest
